<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1b2a4a"/>
      <stop offset="100%" stop-color="#162040"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="50" y1="20" x2="50" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4e4ff" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Left swirl -->
  <path
    d="M 42 80 C 42 80 28 70 30 55 C 31 47 38 43 36 35 C 34 28 30 25 30 25 C 36 30 42 35 40 45 C 38 52 32 56 36 65 C 38 71 44 74 42 80 Z"
    fill="url(#flameGrad)"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Right swirl -->
  <path
    d="M 58 80 C 58 80 72 70 70 55 C 69 47 62 43 64 35 C 66 28 70 25 70 25 C 64 30 58 35 60 45 C 62 52 68 56 64 65 C 62 71 56 74 58 80 Z"
    fill="url(#flameGrad)"
    opacity="0.75"
    filter="url(#glow)"
  />

  <!-- Main center flame -->
  <path
    d="M 50 18 C 50 18 62 30 60 44 C 59 51 52 55 54 63 C 55 68 60 72 58 78 C 55 84 50 86 50 86 C 50 86 45 84 42 78 C 40 72 45 68 46 63 C 48 55 41 51 40 44 C 38 30 50 18 50 18 Z"
    fill="url(#flameGrad)"
    filter="url(#glow)"
  />
</svg>